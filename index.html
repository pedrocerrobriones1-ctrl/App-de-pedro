<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instagram</title>
    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            /* El degradado exacto de la foto */
            background: linear-gradient(135deg, #427ba0 0%, #6f629c 45%, #9e5b85 100%);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Selector de idioma superior */
        .lang-top {
            margin-top: 15px;
            font-size: 14px;
            color: #ffffff;
            display: flex;
            align-items: center;
            opacity: 0.9;
        }
        .lang-top svg {
            width: 12px;
            height: 12px;
            fill: white;
            margin-left: 5px;
        }

        /* Contenedor central */
        .container {
            width: 100%;
            max-width: 400px;
            padding: 0 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            justify-content: center;
            margin-top: -30px; /* Para centrarlo visualmente un poco más arriba */
        }

        /* Logo principal */
        .logo {
            width: 180px;
            margin-bottom: 35px;
            /* Invierte el color negro del logo a blanco puro */
            filter: invert(1) brightness(2);
        }

        /* Cajas de texto */
        .input-group {
            width: 100%;
            margin-bottom: 15px;
        }
        input {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.1); /* Blanco semitransparente */
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px;
            border-radius: 4px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.9);
        }
        input:focus {
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* Botón de Iniciar Sesión */
        button#botonEnviar {
            width: 100%;
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 14px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            margin-top: 5px;
            margin-bottom: 20px;
        }
        button#botonEnviar:active {
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* Texto de ayuda */
        .help-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .help-text strong {
            color: white;
            font-weight: bold;
        }

        /* Divisor "O" */
        .divider {
            display: flex;
            align-items: center;
            width: 100%;
            margin-bottom: 30px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        .divider span {
            margin: 0 10px;
            font-size: 14px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.8);
        }

        /* Botón Facebook */
        .fb-login {
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
        }
        .fb-login svg {
            width: 22px;
            height: 22px;
            fill: white;
            margin-right: 8px;
        }
    </style>
</head>
