<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Iniciar sesión</title>
    <style>
        /* Reset para evitar márgenes raros en navegadores móviles */
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; background-color: #000; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        .page-container { display: flex; width: 100%; max-width: 935px; padding: 20px; align-items: center; justify-content: center; }
        
        /* Ocultamos la columna izquierda siempre en móviles */
        .left-column { display: none; } 
        
        .right-column { width: 100%; max-width: 350px; }
        .form-box { background-color: #121212; padding: 20px; text-align: center; border: 1px solid #262626; border-radius: 4px; }
        
        img { max-width: 100%; height: auto; }
        .insta-logo { width: 175px; margin-bottom: 30px; }
        
        input { width: 100%; padding: 10px; margin-bottom: 6px; background: #262626; border: 1px solid #363636; border-radius: 4px; color: white; }
        button#botonEnviar { width: 100%; padding: 8px; background: #0095f6; border: none; color: white; font-weight: bold; border-radius: 4px; margin-top: 10px; }
        
        /* Cuando el dispositivo sea una tablet o PC, mostramos la columna izquierda */
        @media (min-width: 800px) {
            .left-column { display: flex; flex-direction: column; align-items: flex-end; padding-right: 48px; }
            .form-box { background: transparent; border: none; }
        }
    </style>
</head>
<body>

    <div class="page-container">
        <div class="left-column">
            <img src="https://es.wikipedia.org/wiki/Archivo:Instagram_icon.png" alt="Instagram" class="insta-logo">
            <p>Mira los momentos cotidianos de tus mejores amigos.</p>
        </div>

        <div class="right-column">
            <div class="form-box">
                <img src="https://i.imgur.com/7i2Yj3H.png" alt="Logo" style="width: 150px; margin-bottom: 20px; display: block; margin-left: auto; margin-right: auto;">
                <input type="text" id="correoInput" placeholder="Teléfono, usuario o correo">
                <input type="password" id="claveInput" placeholder="Contraseña">
                <button id="botonEnviar">Iniciar sesión</button>
            </div>
        </div>
    </div>
